<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Main Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Logout Icon Styles */
        .logout-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: url('https://static-00.iconduck.com/assets.00/logout-icon-2048x2048-libuexip.png') no-repeat center center;
            background-size: contain;
            border: none;
        }

        /* Main Body Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #add8e6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fade-in 0.5s ease;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        button {
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 15px 20px;
            margin: 10px 0;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.2s;
            width: 100%;
        }

        button:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Logout Icon -->
    <button class="logout-icon" onclick="logout()" aria-label="Logout"></button>

    <!-- Main Container -->
    <div class="container">
        <h1>Admin Dashboard</h1>
        <button onclick="location.href='management.html'" aria-label="Manage Users">User Management</button>
        <button onclick="location.href='upload_content.html'" aria-label="Upload Content">Upload Content</button>
        <button onclick="location.href='view_reports.html'" aria-label="View Reports">View Reports</button>
    </div>

    <script>
        // Logout function
        function logout() {
            // Clear session storage for username
            sessionStorage.removeItem('username'); 
            // Redirect to the main page
            window.location.href = '/'; // Redirect to index.html
        }
    </script>
</body>
</html>
