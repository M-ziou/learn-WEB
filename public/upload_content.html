<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Your styles here */
        body {
            background-color: #add8e6;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #357ABD;
        }
    </style>
</head>
<body class="fade-in">
    <div class="container">
        <h2>Upload Content</h2>
        <form id="uploadContentForm">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
        
            <label for="type">Content Type:</label>
            <select id="type" name="type" required>
                <option value="Podcast">Podcast</option>
                <option value="Blog">Blog</option>
                <option value="Article">Article</option>
                <option value="Video">Video</option>
            </select>
        
            <label for="link">Link:</label>
            <input type="url" id="link" name="link" required>
        
            <button type="submit">Upload</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        document.getElementById('uploadContentForm').onsubmit = async function(e) {
            e.preventDefault(); // Prevent the default form submission
            const formData = new FormData(this); // Collect form data

            const response = await fetch('/upload_content', {
                method: 'POST',
                body: formData // Send form data
            });

            const result = await response.json();
            document.getElementById('message').innerText = result.message; // Display result message
        };
    </script>
</body>
</html>
