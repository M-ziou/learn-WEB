<!DOCTYPE html>

<head>

        </a>
        <a href="/login/guest" title="Guest">
            <img src="https://static.vecteezy.com/system/resources/previews/009/693/147/non_2x/guests-line-green-and-black-icon-vector.jpg" alt="Guest" class="circular-icon">

    <h2>copyright reserved for LIMU UNI</h2>

    <style>
        body {
            background-color: #add8e6;
            text-align: center;
        }

        .icon-container {
            display: flex;
            justify-content: center;

            flex-wrap: wrap;
        }

        a {
            margin: 15px;
            display: inline-block;
            transition: transform 0.3s;
        }

        a:hover {
            transform: scale(1.1);
        }

        .circular-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
