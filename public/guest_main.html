<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Main Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #add8e6;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: #333;
            margin: 20px 0;
        }

        .content-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s;
        }

        .content-item {
            padding: 20px;
            margin-bottom: 15px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, background-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .content-item:hover {
            transform: translateY(-5px);
            background-color: #e0f7fa;
        }

        .content-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(74, 144, 226, 0.1);
            border-radius: 10px;
            z-index: 0;
            transition: opacity 0.3s;
            opacity: 0;
        }

        .content-item:hover::before {
            opacity: 1;
        }

        .content-title {
            font-size: 1.2em;
            color: #333;
            z-index: 1;
            position: relative;
        }

        a {
            text-decoration: none;
            color: #4A90E2;
            font-weight: bold;
            z-index: 1;
            position: relative;
        }

        a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logout Icon Styles */
        .logout-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: url('https://static-00.iconduck.com/assets.00/logout-icon-2048x2048-libuexip.png') no-repeat center center;
            background-size: contain;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Logout Icon -->
    <button class="logout-icon" onclick="logout()" aria-label="Logout"></button>

    <h1>Content to Explore</h1>
    <div class="content-container" id="contentList"></div>

    <script>
        async function fetchContent() {
            const response = await fetch('/get_guest_content');
            const contents = await response.json();
            const contentList = document.getElementById('contentList');

            contents.forEach(content => {
                const div = document.createElement('div');
                div.className = 'content-item';
                div.innerHTML = `<div class="content-title"><strong>${content.title}</strong> (${content.type})</div><a href="${content.link}" target="_blank">Watch/Read/Listen</a>`;
                contentList.appendChild(div);
            });
        }

        // Logout function
        function logout() {
            // Redirect to the main page
            window.location.href = '/'; // Redirect to index.html
        }

        // Fetch content on page load
        fetchContent();
    </script>
</body>
</html>
